<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ashley's Betting Model</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #080C17;
    color: #E8EAF0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: linear-gradient(135deg, #0B1530 0%, #162550 50%, #0B1530 100%);
    border-bottom: 1px solid #1E3A6A;
    padding: 20px 16px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #00E5A0, #0055FF);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff; flex-shrink: 0;
  }
  .header-text h1 { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .header-text p { font-size: 11px; color: #3A5A8A; margin-top: 1px; }
  .sport-tabs {
    display: flex; gap: 8px; padding: 14px 16px;
    overflow-x: auto; scrollbar-width: none;
    background: #0B1020; border-bottom: 1px solid #131D35;
  }
  .sport-tabs::-webkit-scrollbar { display: none; }
  .sport-btn {
    flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
    border: 1px solid #1A2A4A; background: #0D1525;
    color: #4A6FA8; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .sport-btn.active { background: rgba(0,229,160,0.12); border-color: #00E5A0; color: #00E5A0; }
  .run-btn {
    margin: 16px; width: calc(100% - 32px); padding: 16px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, #00E5A0 0%, #0055FF 100%);
    color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,229,160,0.25);
  }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #1A2A4A; box-shadow: none; }
  .status-bar {
    margin: 0 16px 16px; padding: 10px 14px;
    border-radius: 10px; font-size: 12px; font-weight: 600; display: none;
  }
  .status-bar.error { display: block; background: rgba(255,70,70,0.1); border: 1px solid rgba(255,70,70,0.3); color: #FF8080; }
  .status-bar.info { display: block; background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); color: #00E5A0; }
  .play-card {
    margin: 0 16px 10px; background: #0D1525;
    border-radius: 16px; padding: 16px;
    border: 1px solid transparent; position: relative; overflow: hidden;
  }
  .play-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .play-card.rating-a::before { background: linear-gradient(90deg, #00E5A0, transparent); }
  .play-card.rating-bplus::before { background: linear-gradient(90deg, #4FC3F7, transparent); }
  .play-card.rating-b::before { background: linear-gradient(90deg, #FFB300, transparent); }
  .play-card.rating-a { border-color: rgba(0,229,160,0.2); box-shadow: 0 0 30px rgba(0,229,160,0.06); }
  .play-card.rating-bplus { border-color: rgba(79,195,247,0.2); box-shadow: 0 0 30px rgba(79,195,247,0.06); }
  .play-card.rating-b { border-color: rgba(255,179,0,0.2); box-shadow: 0 0 30px rgba(255,179,0,0.06); }
  .play-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .play-info { flex: 1; }
  .tags { display: flex; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    padding: 3px 8px; border-radius: 5px;
  }
  .tag-vegas { background: rgba(255,100,50,0.15); color: #FF6432; border: 1px solid rgba(255,100,50,0.3); }
  .tag-public { background: rgba(79,195,247,0.12); color: #4FC3F7; border: 1px solid rgba(79,195,247,0.3); }
  .tag-sport { background: rgba(100,100,150,0.15); color: #8A9BC0; border: 1px solid rgba(100,100,150,0.2); }
  .slot-warning {
    font-size: 11px; color: #FF6432; font-weight: 600;
    margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
  }
  .play-game { font-size: 12px; color: #6A8AB0; margin-bottom: 5px; line-height: 1.3; }
  .play-pick { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .rating-badge {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; margin-left: 12px; flex-shrink: 0;
  }
  .rating-badge.a { background: rgba(0,229,160,0.15); color: #00E5A0; border: 2px solid rgba(0,229,160,0.4); }
  .rating-badge.bplus { background: rgba(79,195,247,0.15); color: #4FC3F7; border: 2px solid rgba(79,195,247,0.4); }
  .rating-badge.b { background: rgba(255,179,0,0.15); color: #FFB300; border: 2px solid rgba(255,179,0,0.4); }
  .play-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-box { background: #060D1A; border-radius: 10px; padding: 9px 8px; text-align: center; }
  .stat-label { font-size: 8px; font-weight: 700; letter-spacing: 0.8px; color: #3A5A8A; margin-bottom: 4px; }
  .stat-value { font-size: 16px; font-weight: 800; }
  .play-footer { background: #060D1A; border-radius: 10px; padding: 9px 12px; font-size: 11px; color: #3A5A8A; line-height: 1.5; }
  .play-footer span { color: #6A8AB0; font-weight: 600; }
  .slot-box {
    margin-bottom: 10px; padding: 10px 12px; border-radius: 10px;
    font-size: 12px; font-weight: 600; line-height: 1.5;
  }
  .slot-box.vegas { background: rgba(255,100,50,0.08); border: 1px solid rgba(255,100,50,0.25); color: #FF8060; }
  .slot-box.public { background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.25); color: #4FC3F7; }
  .empty-state { margin: 32px 16px; background: #0D1525; border-radius: 16px; padding: 36px 20px; text-align: center; border: 1px solid #131D35; }
  .empty-icon { font-size: 44px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 800; color: #E8EAF0; margin-bottom: 8px; }
  .empty-desc { font-size: 13px; color: #3A5A8A; line-height: 1.6; }
  .legend { display: flex; gap: 14px; padding: 0 16px 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4A6FA8; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .count-badge {
    display: inline-block; background: rgba(0,229,160,0.15); color: #00E5A0;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    margin: 0 16px 14px; border: 1px solid rgba(0,229,160,0.3);
  }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer { padding: 20px 16px 8px; text-align: center; font-size: 11px; color: #1E3050; line-height: 1.6; }
  .min-edge-note { padding: 0 16px 14px; font-size: 11px; color: #3A5A8A; }
  .min-edge-note span { color: #FF6432; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">A</div>
    <div class="header-text">
      <h1>Ashley's Betting Model</h1>
      <p id="date-display"></p>
    </div>
  </div>
</div>

<div class="sport-tabs">
  <button class="sport-btn active" data-sport="baseball_mlb">MLB</button>
  <button class="sport-btn" data-sport="americanfootball_nfl">NFL</button>
  <button class="sport-btn" data-sport="americanfootball_ncaaf">College FB</button>
  <button class="sport-btn" data-sport="basketball_nba">NBA</button>
  <button class="sport-btn" data-sport="basketball_ncaab">College BB</button>
</div>

<button class="run-btn" id="run-btn" onclick="runModel()">Run Model</button>
<div class="status-bar" id="status-bar"></div>
<div id="results"></div>

<div class="footer">
  Edge = DraftKings sharp line vs best available price<br>
  Vegas slots require 5%+ edge. Always confirm with Action Network Pro.
</div>

<script>
const API_KEY = "049d19f690e4179c427805f956f6dd7c";
let activeSport = "baseball_mlb";

document.getElementById("date-display").textContent = new Date().toLocaleDateString("en-US", {
  weekday: "long", month: "long", day: "numeric"
});

document.querySelectorAll(".sport-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sport-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeSport = btn.dataset.sport;
    document.getElementById("results").innerHTML = "";
    showStatus("", "");
  });
});

function showStatus(msg, type) {
  const bar = document.getElementById("status-bar");
  bar.textContent = msg;
  bar.className = "status-bar " + (type || "");
}

function toImplied(american) {
  if (american > 0) return 100 / (american + 100);
  return Math.abs(american) / (Math.abs(american) + 100);
}

function calcEdge(bestOdds, sharpOdds) {
  return ((toImplied(sharpOdds) - toImplied(bestOdds)) / toImplied(sharpOdds)) * 100;
}

function fmt(n) { return n > 0 ? "+" + n : "" + n; }

function getRating(edge, isVegas) {
  if (isVegas) {
    if (edge >= 7) return { label: "A", cls: "a", color: "#00E5A0", cardCls: "rating-a" };
    if (edge >= 5) return { label: "B+", cls: "bplus", color: "#4FC3F7", cardCls: "rating-bplus" };
    return null;
  } else {
    if (edge >= 7) return { label: "A", cls: "a", color: "#00E5A0", cardCls: "rating-a" };
    if (edge >= 5) return { label: "B+", cls: "bplus", color: "#4FC3F7", cardCls: "rating-bplus" };
    if (edge >= 3) return { label: "B", cls: "b", color: "#FFB300", cardCls: "rating-b" };
    return null;
  }
}

// Victor's slot system
function getSlotInfo(commenceTime, sport) {
  const date = new Date(commenceTime);
  const dayOfWeek = date.getUTCDay(); // 0=Sun, 1=Mon, 2=Tue...
  const hour = date.getUTCHours();
  const minute = date.getUTCMinutes();
  const timeKey = hour * 60 + minute;

  let dayType = "public";

  if (sport.includes("nfl")) {
    // NFL: Thu=public, Sun early=public, Sun afternoon=vegas, Sun night=public, Mon=trap
    if (dayOfWeek === 4) dayType = "public"; // Thursday
    else if (dayOfWeek === 1) dayType = "vegas"; // Monday = trap
    else if (dayOfWeek === 0) {
      if (hour < 17) dayType = "public"; // early games UTC
      else if (hour < 21) dayType = "vegas"; // afternoon
      else dayType = "public"; // night
    }
  } else if (sport.includes("ncaaf")) {
    // College FB: Thu/Fri public, Sat morning public, Sat afternoon vegas, Sat evening public
    if (dayOfWeek === 4 || dayOfWeek === 5) dayType = "public";
    else if (dayOfWeek === 6) {
      if (hour < 15) dayType = "public";
      else if (hour < 23) dayType = "vegas";
      else dayType = "public";
    }
  } else {
    // NBA/MLB/NHL: alternate by time slot
    // Monday=public day, Tuesday=vegas day etc
    const publicDays = [1, 3, 5, 0]; // Mon, Wed, Fri, Sun
    const isDayPublic = publicDays.includes(dayOfWeek);
    // First slot is opposite of day type
    // We simplify: use hour to alternate
    const slotIndex = Math.floor(timeKey / 60);
    const firstSlotIsVegas = isDayPublic; // public day = first slot vegas
    dayType = (slotIndex % 2 === 0) === firstSlotIsVegas ? "vegas" : "public";
  }

  return {
    isVegas: dayType === "vegas",
    label: dayType === "vegas" ? "VEGAS SLOT" : "PUBLIC SLOT",
    description: dayType === "vegas"
      ? "Expect the unexpected. Sharp edge required (5%+). Confirm sharp money."
      : "Sensible outcome expected. Standard research applies.",
  };
}

function processGames(data, sport) {
  const results = [];
  for (const game of data) {
    const books = game.bookmakers || [];
    const sharp = books.find(b => b.key === "draftkings");
    if (!sharp) continue;
    const market = sharp.markets?.find(m => m.key === "h2h");
    if (!market) continue;

    const slotInfo = getSlotInfo(game.commence_time, sport);

    for (const outcome of market.outcomes) {
      const sharpOdds = outcome.price;
      let bestOdds = sharpOdds;
      let bestBook = "DraftKings";

      for (const book of books) {
        if (book.key === "draftkings") continue;
        const bm = book.markets?.find(m => m.key === "h2h");
        if (!bm) continue;
        const match = bm.outcomes?.find(o => o.name === outcome.name);
        if (match && match.price > bestOdds) {
          bestOdds = match.price;
          bestBook = book.title;
        }
      }

      const edge = calcEdge(bestOdds, sharpOdds);
      const rating = getRating(edge, slotInfo.isVegas);

      if (rating) {
        results.push({
          sport: game.sport_title,
          game: game.away_team + " @ " + game.home_team,
          pick: outcome.name,
          sharpOdds, bestOdds, bestBook, edge,
          rating, slotInfo,
          time: new Date(game.commence_time).toLocaleTimeString("en-US", {
            hour: "numeric", minute: "2-digit", timeZoneName: "short"
          })
        });
      }
    }
  }
  return results.sort((a, b) => b.edge - a.edge);
}

function renderPlays(plays) {
  const container = document.getElementById("results");
  if (plays.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">No qualifying plays right now</div>
        <div class="empty-desc">Vegas slots require 5%+ edge. Public slots require 3%+. Check back closer to game time.</div>
      </div>`;
    return;
  }

  let html = `
    <div class="count-badge">${plays.length} QUALIFYING PLAY${plays.length > 1 ? "S" : ""}</div>
    <div class="min-edge-note"><span>Vegas slots</span> require 5%+ edge &nbsp;·&nbsp; Public slots require 3%+</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00E5A0"></div>A = 7%+</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4FC3F7"></div>B+ = 5-7%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFB300"></div>B = 3-5% (public only)</div>
    </div>`;

  for (const play of plays) {
    const r = play.rating;
    html += `
    <div class="play-card ${r.cardCls}">
      <div class="play-top">
        <div class="play-info">
          <div class="tags">
            <span class="tag ${play.slotInfo.isVegas ? 'tag-vegas' : 'tag-public'}">
              ${play.slotInfo.isVegas ? '⚡ VEGAS' : '✓ PUBLIC'}
            </span>
            <span class="tag tag-sport">${play.sport}</span>
          </div>
          <div class="play-game">${play.game} · ${play.time}</div>
          <div class="play-pick">${play.pick} ML</div>
        </div>
        <div class="rating-badge ${r.cls}">${r.label}</div>
      </div>

      <div class="slot-box ${play.slotInfo.isVegas ? 'vegas' : 'public'}">
        ${play.slotInfo.description}
      </div>

      <div class="play-stats">
        <div class="stat-box">
          <div class="stat-label">SHARP LINE</div>
          <div class="stat-value" style="color:#fff">${fmt(play.sharpOdds)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">BEST ODDS</div>
          <div class="stat-value" style="color:${r.color}">${fmt(play.bestOdds)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">EDGE</div>
          <div class="stat-value" style="color:${r.color}">+${play.edge.toFixed(1)}%</div>
        </div>
      </div>

      <div class="play-footer">
        Best book: <span>${play.bestBook}</span> &nbsp;·&nbsp;
        ${play.slotInfo.isVegas ? 'Vegas slot: confirm sharp money + check Action Network Pro' : 'Public slot: confirm lineup and injury report'}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

async function runModel() {
  const btn = document.getElementById("run-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Finding value...';
  showStatus("", "");
  document.getElementById("results").innerHTML = "";

  const url = `https://api.the-odds-api.com/v4/sports/${activeSport}/odds/?apiKey=${API_KEY}&regions=us&markets=h2h&oddsFormat=american&bookmakers=draftkings,fanduel,betmgm,bovada,betonlineag,mybookieag`;

  try {
    const res = await fetch(url);
    if (!res.ok) {
      if (res.status === 401) throw new Error("API key issue.");
      if (res.status === 422) throw new Error("No games available for this sport right now.");
      throw new Error("API error " + res.status);
    }
    const data = await res.json();
    if (!data.length) {
      showStatus("No games on the slate for this sport right now.", "info");
    } else {
      const plays = processGames(data, activeSport);
      renderPlays(plays);
    }
  } catch (e) {
    if (e.message.includes("fetch") || e.message.includes("Network")) {
      showStatus("Network blocked in this environment. Try opening the app directly at your GitHub Pages link.", "error");
    } else {
      showStatus(e.message, "error");
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Run Model";
  }
}
</script>
</body>
</html>
